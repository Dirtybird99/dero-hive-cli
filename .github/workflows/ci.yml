name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / npm ${{ matrix.npm }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        npm: [10, 12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@${{ matrix.npm }}
      - run: npm --version
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Check committed bundles
        run: git diff --exit-code -- cli/dist/hive.mjs resources/mcp/dero-mcp-server/dist/index.js
      - name: Test packed installation
        run: npm run test:package

  quality:
    name: Coverage and MCP conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run test:mcp-conformance

  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
