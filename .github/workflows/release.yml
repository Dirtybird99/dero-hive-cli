name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_VERSION: 12.0.1

jobs:
  verify:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Validate release tag
        shell: bash
        run: |
          tag_type=$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")
          package_version=$(node -p 'require("./package.json").version')
          test "${tag_type}" = tag
          test "${GITHUB_REF_NAME}" = "v${package_version}"
          git merge-base --is-ancestor HEAD origin/main
      - run: npm install --global --ignore-scripts --allow-remote=all npm@${{ env.NPM_VERSION }}
      - name: Verify npm version
        run: node -e "const {execSync}=require('node:child_process'); const v=execSync('npm --version',{encoding:'utf8'}).trim(); if(v!==process.env.NPM_VERSION) throw new Error('Expected npm '+process.env.NPM_VERSION+', got '+v)"
      - run: npm ci --strict-allow-scripts --allow-remote=none
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Check committed bundles
        run: git diff --exit-code -- cli/dist/hive.mjs resources/mcp/dero-mcp-server/dist/index.js
      - name: Test packed installation
        run: npm run test:package

  build:
    name: Build and verify release archive
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Validate release tag
        shell: bash
        run: |
          tag_type=$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")
          package_version=$(node -p 'require("./package.json").version')
          test "${tag_type}" = tag
          test "${GITHUB_REF_NAME}" = "v${package_version}"
          git merge-base --is-ancestor HEAD origin/main
      - run: npm install --global --ignore-scripts --allow-remote=all npm@${{ env.NPM_VERSION }}
      - name: Verify npm version
        run: node -e "const {execSync}=require('node:child_process'); const v=execSync('npm --version',{encoding:'utf8'}).trim(); if(v!==process.env.NPM_VERSION) throw new Error('Expected npm '+process.env.NPM_VERSION+', got '+v)"
      - run: npm ci --strict-allow-scripts --allow-remote=none
      - run: npm run test:coverage
      - run: npm run test:mcp-conformance
      - run: npm audit --omit=dev --audit-level=high
      - run: npm --prefix resources/mcp/dero-mcp-server audit --omit=dev --audit-level=high
      - run: npm run build
      - name: Check committed bundles
        run: git diff --exit-code -- cli/dist/hive.mjs resources/mcp/dero-mcp-server/dist/index.js
      - name: Pack once and test that archive
        run: node scripts/package-acceptance.mjs artifacts/dero-hive-cli.tgz
      - name: Generate checksum
        working-directory: artifacts
        run: sha256sum dero-hive-cli.tgz > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.sha }}
          path: |
            artifacts/dero-hive-cli.tgz
            artifacts/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Attest and publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_REPO: ${{ github.repository }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-${{ github.sha }}
          path: artifacts
      - name: Verify transferred archive
        working-directory: artifacts
        run: sha256sum --check SHA256SUMS
      - name: Refuse to replace an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; refusing to replace it." >&2
            exit 1
          fi
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/dero-hive-cli.tgz
      - name: Create and publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/dero-hive-cli.tgz \
            artifacts/SHA256SUMS \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "DERO Hive CLI ${GITHUB_REF_NAME}"
          gh release edit "${GITHUB_REF_NAME}" --draft=false
